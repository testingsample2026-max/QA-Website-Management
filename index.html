<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
    <script>
      (function() {
        try {
          const target = window;
          const desc = Object.getOwnPropertyDescriptor(target, 'fetch') || Object.getOwnPropertyDescriptor(Object.getPrototypeOf(target), 'fetch');
          if (desc && (desc.configurable || desc.configurable === undefined)) {
            const originalFetch = target.fetch;
            let currentFetch = originalFetch;
            Object.defineProperty(target, 'fetch', {
              get: function() { return currentFetch; },
              set: function(val) { currentFetch = val; },
              configurable: true,
              enumerable: true
            });
          }
        } catch (e) {
          console.warn('Sandbox fetch setter polyfill failed:', e);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
